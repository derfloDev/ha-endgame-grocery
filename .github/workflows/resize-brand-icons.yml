name: Resize Brand Icons

on:
  workflow_dispatch:

jobs:
  resize:
    name: Resize brand icons and commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Pillow
        run: pip install Pillow

      - name: Resize to 256×256 (icon.png) and 512×512 (icon@2x.png)
        run: |
          python3 - <<'EOF'
          from PIL import Image
          from pathlib import Path

          src = Path("assets/endgame_grocery_logo.png")
          brand = Path("custom_components/endgame_grocery/brand")
          brand.mkdir(parents=True, exist_ok=True)

          img = Image.open(src).convert("RGBA")
          img.resize((256, 256), Image.LANCZOS).save(brand / "icon.png", optimize=True)
          img.resize((512, 512), Image.LANCZOS).save(brand / "icon@2x.png", optimize=True)
          print("Icons written:", list(brand.iterdir()))
          EOF

      - name: Commit resized icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/endgame_grocery/brand/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(brand): resize icons to 256x256 and 512x512 for HA 2026.3+ brand API"
          git push
